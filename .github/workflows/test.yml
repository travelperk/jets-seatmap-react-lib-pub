name: Test suit
run-name: Running test suit 🚀

on:
  push:
  pull_request:
    branches:
      - version-3

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.18

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm run test:ci
